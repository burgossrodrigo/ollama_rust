name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "api/**"

env:
  PROJECT_ID:    ${{ vars.GCP_PROJECT_ID }}
  REGION:        us-east1
  ARTIFACT_REPO: api-repo
  IMAGE_PATH:    us-east1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/api-repo/api-rust

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build & Push API
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.sha.outputs.short }}

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: |
          set -euo pipefail
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & Push
        run: |
          set -euo pipefail
          VERSION="${{ steps.sha.outputs.short }}"
          echo "[build] API -- ${VERSION}"
          docker build \
            --platform linux/amd64 \
            --tag "${{ env.IMAGE_PATH }}:${VERSION}" \
            --tag "${{ env.IMAGE_PATH }}:latest" \
            ./api
          echo "[push] Pushing to Artifact Registry..."
          docker push "${{ env.IMAGE_PATH }}:${VERSION}"
          docker push "${{ env.IMAGE_PATH }}:latest"
          echo "[OK] Image pushed -- ${VERSION}"

  deploy:
    name: Rollout API
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Configure kubectl
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER }}
          location:     ${{ vars.GKE_ZONE }}
          project_id:   ${{ vars.GCP_PROJECT_ID }}

      - name: Rollout restart
        run: |
          set -euo pipefail
          VERSION="${{ needs.build.outputs.version }}"
          echo "[deploy] Rolling out API -- ${VERSION}"
          kubectl set image deployment/ollama-api \
            api=${{ env.IMAGE_PATH }}:${VERSION} \
            -n ollama
          kubectl rollout status deployment/ollama-api -n ollama --timeout=180s
          echo "[OK] API deployed -- ${VERSION}"
