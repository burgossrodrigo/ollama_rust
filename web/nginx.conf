server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SSE proxy — streaming exige buffering desligado
    location /prompt {
        proxy_pass         http://ollama-api.ollama.svc.cluster.local:80;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /health {
        proxy_pass http://ollama-api.ollama.svc.cluster.local:80;
    }

    location /status {
        proxy_pass http://ollama-api.ollama.svc.cluster.local:80;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
